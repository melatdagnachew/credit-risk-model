name: CI

on:
  push:
    branches:
      - main
      - task-*
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

       - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Run Linter
        run: |
          flake8 src tests

      - name: Run Tests
        run: |
          pytest
